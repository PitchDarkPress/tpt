<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Proauthorist Translator</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  background:#050607;
  color:#d8922f;
  font-family:"Courier New", monospace;
  overflow:auto;
}

body{
  padding:20px;
}

.app{
  width:min(920px,100%);
  margin:0 auto;
  background:#020303;
  border:1px solid rgba(216,146,47,.18);
  padding:24px;
}

.title{
  text-align:center;
  font-size:22px;
  letter-spacing:2px;
  margin-bottom:22px;
  color:#d8922f;
}

.box{
  width:100%;
  min-height:190px;
  background:#010202;
  color:#d7d7d7;
  border:1px solid rgba(216,146,47,.65);
  padding:22px;
  font-size:18px;
  line-height:1.5;
  resize:vertical;
  outline:none;
}

.box::placeholder{
  color:#70757d;
  opacity:.7;
}

.output{
  color:#b6d86a;
  white-space:pre-wrap;
  min-height:190px;
}

.controls{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin:16px 0 18px;
}

button{
  background:#040404;
  color:#d8922f;
  border:1px solid rgba(216,146,47,.55);
  padding:10px 24px;
  font-family:"Courier New", monospace;
  font-size:18px;
  cursor:pointer;
  letter-spacing:1px;
  transition:.2s ease;
}

button:hover{
  border-color:#d8922f;
  box-shadow:0 0 10px rgba(216,146,47,.18);
}

.status{
  text-align:right;
  color:#22e640;
  font-size:16px;
  min-height:24px;
  margin-top:14px;
  opacity:0;
  transition:.2s ease;
}

.status.show{
  opacity:1;
}

.footer{
  text-align:center;
  margin-top:28px;
  font-size:12px;
  line-height:1.6;
  color:#d8922f;
  opacity:.7;
}

@media(max-width:700px){

  body{
    padding:10px;
  }

  .app{
    padding:16px;
  }

  .title{
    font-size:18px;
  }

  .box{
    font-size:16px;
    min-height:160px;
    padding:18px;
  }

  .controls{
    justify-content:space-between;
  }

  button{
    width:48%;
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="title">
    THE PROAUTHORIST TRANSLATOR
  </div>

  <textarea
    id="input"
    class="box"
    spellcheck="true"
    placeholder="TPT translates human language into a form AI can understand."></textarea>

  <div class="controls">
    <button onclick="clearAll()">CLEAR</button>
    <button onclick="translateText()">DONE</button>
  </div>

  <div id="output" class="box output"></div>

  <div id="status" class="status">
    Translation copied. Paste to AI...
  </div>

  <div class="footer">
    Declared collaboration. The medium evolves, the strangeness remains.
  </div>

</div>

<script>
function toSnake(text){
  return text
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g,"")
    .trim()
    .replace(/\s+/g,"_");
}

function translateText(){

  const input = document.getElementById("input").value.trim();
  const output = document.getElementById("output");
  const status = document.getElementById("status");

  if(!input){
    output.textContent = "";
    status.classList.remove("show");
    return;
  }

  const lines = input
    .split(/\n+/)
    .map(l => l.trim())
    .filter(Boolean);

  let result = [];

  result.push("PROJECT=TPT");
  result.push("MODE=human_to_ai_translation");
  result.push("INPUT=human_language");
  result.push("INTENT=preserve");
  result.push("");

  lines.forEach((line,index)=>{
    result.push(
      "STATEMENT_" +
      String(index + 1).padStart(2,"0") +
      "=" +
      toSnake(line)
    );
  });

  result.push("");
  result.push("CORE_RULE=do_not_rewrite_intent");
  result.push("SPELLING_ONLY=true");
  result.push("READY_FOR_AI=true");

  const finalText = result.join("\n");

  output.textContent = finalText;

  navigator.clipboard.writeText(finalText).then(()=>{
    status.classList.add("show");
  });
}

function clearAll(){

  document.getElementById("input").value = "";
  document.getElementById("output").textContent = "";
  document.getElementById("status").classList.remove("show");
}
</script>

</body>
</html>
