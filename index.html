<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Proauthorist Translator</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  background:#050607;
  color:#d8922f;
  font-family:"Courier New",monospace;
}

body{padding:18px}

.app{
  width:min(860px,100%);
  margin:0 auto;
  background:#020303;
  border:1px solid rgba(216,146,47,.18);
  padding:20px;
}

.title{
  text-align:center;
  font-size:19px;
  letter-spacing:3px;
  margin-bottom:18px;
}

.box{
  width:100%;
  height:170px;
  background:#010202;
  color:#f1f1f1;
  border:1px solid rgba(216,146,47,.62);
  padding:18px;
  font-size:16px;
  line-height:1.5;
  resize:none;
  outline:none;
  overflow-y:auto;
}

.box::placeholder{
  color:#737882;
  opacity:.72;
}

.output{
  color:#b6d86a;
  white-space:pre-wrap;
  word-break:break-word;
  overflow-wrap:anywhere;
}

.controls{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin:12px 0 14px;
}

button{
  background:#040404;
  color:#d8922f;
  border:1px solid rgba(216,146,47,.5);
  padding:6px 13px;
  font-family:"Courier New",monospace;
  font-size:13px;
  cursor:pointer;
  letter-spacing:1px;
}

button:hover{
  border-color:#d8922f;
  box-shadow:0 0 8px rgba(216,146,47,.16);
}

.status{
  text-align:right;
  color:#22e640;
  font-size:13px;
  margin-top:10px;
  opacity:0;
  min-height:18px;
}

.status.show{opacity:1}

.footer{
  text-align:center;
  margin-top:22px;
  font-size:12px;
  line-height:1.7;
  color:#d8922f;
  opacity:.72;
}

@media(max-width:700px){
  body{padding:10px}
  .app{padding:14px}
  .title{font-size:16px}
  .box{height:155px;font-size:15px;padding:15px}
  button{width:32%;font-size:12px;padding:7px 6px}
  .controls{justify-content:space-between}
}
</style>
</head>

<body>

<div class="app">

  <div class="title">THE PROAUTHORIST TRANSLATOR</div>

  <textarea
    id="input"
    class="box"
    lang="en-GB"
    spellcheck="true"
    placeholder="TPT translates human language into a form AI can understand."></textarea>

  <div class="controls">
    <button onclick="undoText()">UNDO</button>
    <button onclick="clearAll()">CLEAR</button>
    <button onclick="translateText()">DONE</button>
  </div>

  <div id="output" class="box output"></div>

  <div id="status" class="status">Compressed. Copied. Paste to AI...</div>

  <div class="footer">
    Declared collaboration. The medium evolves, the strangeness remains.<br>
    Pitch Dark Research &amp; Development — © 2026
  </div>

</div>

<script>
let previousText = "";

const phraseMap = [
  ["spell checker is not working", "SPELLCHECK_NOT_WORKING"],
  ["spell cheacker is not working", "SPELLCHECK_NOT_WORKING"],
  ["spell cheaker is not working", "SPELLCHECK_NOT_WORKING"],
  ["spellcheck is not working", "SPELLCHECK_NOT_WORKING"],
  ["not working", "NOT_WORKING"],

  ["i don't really care", "DONT_CARE"],
  ["i dont really care", "DONT_CARE"],
  ["dont really care", "DONT_CARE"],
  ["don't really care", "DONT_CARE"],
  ["dont care", "DONT_CARE"],

  ["unless it's an easy fix", "UNLESS_EASY_FIX"],
  ["unless its an easy fix", "UNLESS_EASY_FIX"],
  ["unless easy fix", "UNLESS_EASY_FIX"],
  ["easy fix", "EASY_FIX"],

  ["what happens if", "Q_WHAT_HAPPENS"],
  ["what happens", "Q_WHAT_HAPPENS"],
  ["html code", "HTML_CODE"],

  ["top box is fine", "TOP_BOX_OK"],
  ["top box fine", "TOP_BOX_OK"],
  ["has scroll bar", "SCROLLBAR_TRUE"],
  ["scroll bar", "SCROLLBAR_TRUE"],
  ["scrollbar", "SCROLLBAR_TRUE"],

  ["bottom box expands downwards", "BOTTOM_BOX_EXPANDS_WRONG"],
  ["bottom box expands downward", "BOTTOM_BOX_EXPANDS_WRONG"],
  ["bottom box expands", "BOTTOM_BOX_EXPANDS_WRONG"],
  ["should not do", "SHOULD_NOT"],
  ["stay same size", "STATIC_SIZE"],
  ["same size at all times", "STATIC_SIZE"],
  ["function like the top one", "MATCH_TOP_BOX"],
  ["bottom box should function", "BOTTOM_MATCH_TOP"],

  ["make the code", "BUILD_CODE"],
  ["make code", "BUILD_CODE"],
  ["lets make that code", "BUILD_CODE"],
  ["let's make that code", "BUILD_CODE"],
  ["see what claude makes of it", "TEST_CLAUDE"],
  ["what claude makes of it", "TEST_CLAUDE"],

  ["whole code", "FULL_CODE"],
  ["full code", "FULL_CODE"],
  ["upload ready", "UPLOAD_READY"],
  ["replace the whole", "REPLACE_ALL"],

  ["add undo", "UNDO+"],
  ["undo button", "UNDO+"],
  ["add clear", "CLEAR+"],
  ["clear button", "CLEAR+"],
  ["done button", "DONE_BTN"],

  ["buttons can be smaller", "BUTTONS--"],
  ["buttons smaller", "BUTTONS--"],
  ["slightly smaller", "SIZE-"],
  ["smaller still", "SIZE--"],

  ["copyright has gone", "COPYRIGHT+"],
  ["copyright hads gone", "COPYRIGHT+"],
  ["copyright needs to go back", "COPYRIGHT+"],
  ["restore copyright", "COPYRIGHT+"],
  ["keep the text", "KEEP_TEXT"],
  ["keep the footer", "KEEP_FOOTER"],

  ["do not rewrite", "NO_REWRITE"],
  ["dont rewrite", "NO_REWRITE"],
  ["no rewrite", "NO_REWRITE"],
  ["spell only", "SPELL_ONLY"],
  ["spelling only", "SPELL_ONLY"]
];

const stopWords = new Set([
  "a","an","and","are","as","at","be","but","by","can","could","do","does",
  "for","from","had","has","have","here","i","if","in","is","it","its",
  "just","like","me","my","of","on","or","please","really","so","some",
  "that","the","then","there","this","to","we","what","when","where","who",
  "why","will","with","you","your","also","need","needs","should","would",
  "was","were","am","been","being","all","times","one","up","down"
]);

function normalise(text){
  return text
    .toLowerCase()
    .replace(/[’']/g,"")
    .replace(/[^a-z0-9\s]/g," ")
    .replace(/\s+/g," ")
    .trim();
}

function removePhrase(text, phrase){
  return text.replaceAll(phrase, " ").replace(/\s+/g," ").trim();
}

function compressLine(line){
  let working = normalise(line);
  let output = [];

  phraseMap.forEach(([phrase, code])=>{
    if(working.includes(phrase)){
      if(!output.includes(code)) output.push(code);
      working = removePhrase(working, phrase);
    }
  });

  let remaining = working
    .split(" ")
    .filter(word => word && !stopWords.has(word))
    .join("_")
    .toUpperCase();

  if(remaining && !output.includes(remaining)){
    output.push(remaining);
  }

  return output;
}

function translateText(){
  const inputField = document.getElementById("input");
  const raw = inputField.value.trim();
  const output = document.getElementById("output");
  const status = document.getElementById("status");

  if(!raw){
    output.textContent = "";
    status.classList.remove("show");
    return;
  }

  previousText = inputField.value;

  const lines = raw.split(/\n+/).map(l=>l.trim()).filter(Boolean);
  let result = [];

  lines.forEach(line=>{
    result.push(...compressLine(line));
  });

  result = [...new Set(result)];

  if(!result.length){
    result.push("INTENT_UNCLEAR");
  }

  const finalText = result.join("\n");
  output.textContent = finalText;

  navigator.clipboard.writeText(finalText).then(()=>{
    status.textContent = "Compressed. Copied. Paste to AI...";
    status.classList.add("show");
  }).catch(()=>{
    status.textContent = "Compressed. Copy manually.";
    status.classList.add("show");
  });
}

function clearAll(){
  const inputField = document.getElementById("input");
  previousText = inputField.value;
  inputField.value = "";
  document.getElementById("output").textContent = "";
  document.getElementById("status").classList.remove("show");
}

function undoText(){
  document.getElementById("input").value = previousText;
}
</script>

</body>
</html>
